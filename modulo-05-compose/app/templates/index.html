<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f3f3; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #333; }
        .instance { font-size: 12px; color: #999; margin-bottom: 20px; }
        form { margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background: #007bff; border: none; border-radius: 4px; color: white; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: white; padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        li.completed span { text-decoration: line-through; color: #999; }
        a { margin-left: 10px; text-decoration: none; color: #007bff; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>TaskManager</h1>
    <p class="instance">instância: {{ instance }}</p>

    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Nova tarefa..." required>
        <button type="submit">Adicionar</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li class="{{ 'completed' if task.completed }}">
            <span>{{ task.title }}</span>
            <a href="/complete/{{ task.id }}">
                {% if task.completed %}desfazer{% else %}concluir{% endif %}
            </a>
            <a href="/delete/{{ task.id }}">excluir</a>
        </li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
